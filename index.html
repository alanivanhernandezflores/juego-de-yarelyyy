<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Yarely 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* 🌸 corazones */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* 🎬 pantalla inicio */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

#startBtn {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: #ff1493;
    color: white;
}

/* 💌 pantalla final */
#endScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,192,203,0.95);
    z-index: 6;
    text-align: center;
    padding: 20px;
}

#endScreen h2 {
    color: #d63384;
}

/* juego */
#gameContainer {
    text-align: center;
    z-index: 2;
    position: relative;
}

canvas {
    background: #fff0f5;
    border-radius: 20px;
    margin-top: 10px;
}

#score {
    color: white;
}

/* botones */
button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #ff69b4;
    color: white;
}
</style>
</head>

<body>

<!-- 🎬 INICIO -->
<div id="startScreen">
    <h1>🐍 Para Yarely 💖</h1>
    <p>Hecho con todo mi amor 💕</p>
    <button id="startBtn">Entrar 💖</button>
</div>

<!-- 💌 FINAL -->
<div id="endScreen">
    <h2>💖 Para ti Yarely 💖</h2>
    <p>
    Este juego es solo una pequeña forma de decirte  
    lo mucho que te quiero 💕  
    <br><br>
    Eres mi persona favorita 💖  
    </p>
    <button onclick="location.reload()">Jugar otra vez</button>
</div>

<div id="gameContainer">
    <h1>🐍 Juego 💖</h1>
    <div id="score">Puntos: 0</div>
    <canvas id="game" width="500" height="500"></canvas>

    <div>
        <button onclick="setDirection('UP')">⬆️</button><br>
        <button onclick="setDirection('LEFT')">⬅️</button>
        <button onclick="setDirection('DOWN')">⬇️</button>
        <button onclick="setDirection('RIGHT')">➡️</button>
    </div>
</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 25;
let snake, direction, score, food, speed, game;

// imágenes
const snakeImg = new Image();
snakeImg.src = "https://i.imgur.com/6X12UGx.png";

const foodImg = new Image();
foodImg.src = "https://i.imgur.com/5cX1FQK.png";

document.getElementById("startBtn").onclick = startGame;

function startGame(){
    document.getElementById("startScreen").style.display = "none";

    snake = [{x:250,y:250}];
    direction = "RIGHT";
    score = 0;
    speed = 200;

    food = randomFood();

    game = setInterval(draw, speed);
}

function randomFood(){
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

function setDirection(dir){
    if(dir==="UP" && direction!=="DOWN") direction="UP";
    else if(dir==="DOWN" && direction!=="UP") direction="DOWN";
    else if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
    else if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";
}

// swipe
let startX, startY;
canvas.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});
canvas.addEventListener("touchmove", e=>{
    let dx = e.touches[0].clientX - startX;
    let dy = e.touches[0].clientY - startY;

    if(Math.abs(dx) > Math.abs(dy)){
        dx>0?setDirection("RIGHT"):setDirection("LEFT");
    } else {
        dy>0?setDirection("DOWN"):setDirection("UP");
    }
});

function draw(){
    ctx.clearRect(0,0,500,500);

    ctx.drawImage(foodImg, food.x, food.y, box, box);

    snake.forEach(p=>{
        ctx.drawImage(snakeImg, p.x, p.y, box, box);
    });

    let x = snake[0].x;
    let y = snake[0].y;

    if(direction==="LEFT") x-=box;
    if(direction==="UP") y-=box;
    if(direction==="RIGHT") x+=box;
    if(direction==="DOWN") y+=box;

    if(x===food.x && y===food.y){
        score++;
        document.getElementById("score").innerText="Puntos: "+score;
        food = randomFood();

        if(speed > 80){
            speed -= 5;
            clearInterval(game);
            game = setInterval(draw, speed);
        }

        // 🎁 desbloqueo secreto
        if(score === 10){
            alert("💌 Mensaje secreto desbloqueado 💖");
        }

    } else {
        snake.pop();
    }

    let newHead = {x:x,y:y};

    if(x<0||y<0||x>=500||y>=500||collision(newHead,snake)){
        clearInterval(game);
        document.getElementById("endScreen").style.display = "block";
    }

    snake.unshift(newHead);
}

function collision(head,array){
    return array.some(p=>p.x===head.x && p.y===head.y);
}

// corazones
setInterval(()=>{
    let h = document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);
</script>

</body>
</html>
