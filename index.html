<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Yarely 💖</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow:hidden;
}

h1{color:white;}
#score{color:white;font-size:20px;}

canvas{
    background:#fff0f5;
    border-radius:20px;
    margin-top:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#ff69b4;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<h1>🐍 Para Yarely 💖</h1>
<div id="score">Puntos: 0</div>

<canvas id="game" width="500" height="500"></canvas>

<div>
    <button onclick="setDirection('UP')">⬆️</button><br>
    <button onclick="setDirection('LEFT')">⬅️</button>
    <button onclick="setDirection('DOWN')">⬇️</button>
    <button onclick="setDirection('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 25;
let snake = [{x:250,y:250}];
let direction = "RIGHT";
let score = 0;
let speed = 200;
let game;

// 🍓 imagen fresa
const foodImg = new Image();
foodImg.src = "fresa.png";

let loaded = false;

foodImg.onload = () => {
    loaded = true;
    game = setInterval(draw, speed);
};

// 🍓 comida
function randomFood(){
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

let food = randomFood();

// 🎮 controles
function setDirection(dir){
    if(dir==="UP" && direction!=="DOWN") direction="UP";
    else if(dir==="DOWN" && direction!=="UP") direction="DOWN";
    else if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
    else if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";
}

// 📱 swipe (iPhone)
let startX, startY;

canvas.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", e=>{
    let dx = e.touches[0].clientX - startX;
    let dy = e.touches[0].clientY - startY;

    if(Math.abs(dx) > Math.abs(dy)){
        dx>0?setDirection("RIGHT"):setDirection("LEFT");
    } else {
        dy>0?setDirection("DOWN"):setDirection("UP");
    }
});

// 🎨 función para dibujar cabeza con cara
function drawHead(x,y){
    // cabeza
    ctx.beginPath();
    ctx.fillStyle = "#ff1493";
    ctx.arc(x+12,y+12,12,0,Math.PI*2);
    ctx.fill();

    // ojos
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x+8,y+10,3,0,Math.PI*2);
    ctx.arc(x+16,y+10,3,0,Math.PI*2);
    ctx.fill();

    // pupilas
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(x+8,y+10,1.5,0,Math.PI*2);
    ctx.arc(x+16,y+10,1.5,0,Math.PI*2);
    ctx.fill();

    // sonrisa
    ctx.strokeStyle = "black";
    ctx.beginPath();
    ctx.arc(x+12,y+14,4,0,Math.PI);
    ctx.stroke();
}

// 🎮 juego
function draw(){
    if(!loaded) return;

    ctx.clearRect(0,0,500,500);

    // 🍓 fresa
    ctx.drawImage(foodImg, food.x, food.y, box, box);

    // 🐍 cuerpo
    snake.forEach((p,i)=>{
        if(i===0){
            drawHead(p.x,p.y);
        } else {
            ctx.beginPath();
            ctx.fillStyle = "#ff69b4";
            ctx.arc(p.x+12,p.y+12,10,0,Math.PI*2);
            ctx.fill();
        }
    });

    let x = snake[0].x;
    let y = snake[0].y;

    if(direction==="LEFT") x-=box;
    if(direction==="UP") y-=box;
    if(direction==="RIGHT") x+=box;
    if(direction==="DOWN") y+=box;

    // comer
    if(x===food.x && y===food.y){
        score++;
        document.getElementById("score").innerText="Puntos: "+score;
        food = randomFood();

        if(speed > 80){
            speed -= 5;
            clearInterval(game);
            game = setInterval(draw, speed);
        }

    } else {
        snake.pop();
    }

    let newHead = {x:x,y:y};

    // colisiones
    if(
        x<0||y<0||
        x>=500||y>=500||
        collision(newHead,snake)
    ){
        clearInterval(game);
        alert("💖 Te amo Yarely 💕");
        location.reload();
    }

    snake.unshift(newHead);
}

function collision(head,array){
    return array.some(p=>p.x===head.x && p.y===head.y);
}
</script>

</body>
</html>
